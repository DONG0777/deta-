<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>প্রো পিপল ম্যানেজার | কার্ড ভিউ + CSV এক্সপোর্ট</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            padding: 20px 16px 40px;
            color: #1a2c3e;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
            gap: 12px;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f2b3d, #1b4a6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .lock-badge {
            background: #fef9c3;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }

        .form-card {
            display: none;
            background: #ffffff;
        }
        .form-card.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 700;
            font-size: 0.75rem;
            color: #2c4c6e;
        }
        input, select, textarea {
            padding: 14px 16px;
            border: 1.5px solid #e2edf7;
            border-radius: 28px;
            font-size: 1rem;
            background: white;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .phone-hint {
            font-size: 0.7rem;
            margin-top: 4px;
        }
        .valid { color: #10b981; }
        .invalid { color: #ef4444; }

        .btn {
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(105deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow: 0 4px 10px rgba(37,99,235,0.3);
        }
        .btn-success {
            background: linear-gradient(105deg, #10b981, #059669);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(105deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-warning {
            background: linear-gradient(105deg, #f59e0b, #d97706);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e6;
        }
        .btn-new {
            width: 100%;
            background: linear-gradient(105deg, #1e2f3f, #0f212f);
            color: white;
            padding: 14px;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }
        button:active { transform: scale(0.97); }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1.5px solid #e2edf7;
            font-size: 1rem;
            background: white;
            margin-bottom: 1rem;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .filters select {
            flex: 1;
            min-width: 110px;
            background: white;
        }

        .people-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .person-card {
            background: white;
            border-radius: 28px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .person-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f2b3d;
        }
        .person-phone {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2563eb;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .detail-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #334155;
        }
        .detail-badge {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .note-text {
            background: #fefce8;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #5b4e1e;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 14px;
            border-top: 1px solid #eef2f8;
            padding-top: 14px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: 0.1s;
        }
        .icon-btn:hover { background: #f1f5f9; }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 12px 16px;
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #2563eb;
        }

        .highlight {
            background-color: #fef08a;
            border-radius: 8px;
            padding: 0 2px;
        }
        @media (max-width: 550px) {
            body { padding: 16px 12px; }
            .card { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👥 প্রো পিপল ম্যানেজার</h1>
        <div class="lock-badge">🔐 ডিলিট/রিসেটে পাসওয়ার্ড</div>
    </div>

    <button id="toggleFormBtn" class="btn btn-new">➕ নতুন সদস্য যোগ করুন</button>

    <div id="formCard" class="card form-card">
        <h2 id="formTitle" style="margin-bottom: 1rem;">➕ নতুন সদস্য</h2>
        <form id="peopleForm">
            <div class="form-grid">
                <div class="form-group"><label>নাম *</label><input type="text" id="name" required autocomplete="off" placeholder="পূর্ণ নাম"></div>
                <div class="form-group"><label>ফোন * (ভারতীয়)</label><input type="tel" id="phone" required autocomplete="off" placeholder="10 ডিজিট"><span id="phoneHint" class="phone-hint"></span></div>
                <div class="form-group"><label>এলাকা</label><input type="text" id="area" placeholder="যেমন: কলকাতা"></div>
                <div class="form-group"><label>রোল</label><input type="text" id="role" placeholder="সদস্য/নেত্রী"></div>
                <div class="form-group"><label>ক্লাস্টার</label><input type="text" id="cluster" placeholder="উত্তর/দক্ষিণ"></div>
                <div class="form-group"><label>নোট</label><textarea id="note" rows="2" placeholder="বিশেষ তথ্য..."></textarea></div>
            </div>
            <div class="btn-group"><button type="submit" class="btn btn-success" id="submitBtn">💾 সংরক্ষণ</button><button type="button" id="cancelEditBtn" class="btn btn-outline" style="display:none;">বাতিল</button></div>
            <input type="hidden" id="editId" value="">
        </form>
    </div>

    <div class="card" style="padding: 1.2rem;">
        <input type="text" id="searchBox" class="search-box" placeholder="🔍 নাম, ফোন, এলাকা দিয়ে খুঁজুন...">
        <div class="filters">
            <select id="filterRole"><option value="">সব রোল</option></select>
            <select id="filterArea"><option value="">সব এলাকা</option></select>
            <select id="filterCluster"><option value="">সব ক্লাস্টার</option></select>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>মোট সদস্য</div></div>
            <div class="stat-card"><div class="stat-number" id="filteredCount">0</div><div>দেখানো হচ্ছে</div></div>
        </div>

        <div id="peopleGrid" class="people-grid"></div>

        <div class="btn-group" style="margin-top: 24px; justify-content: center;">
            <button id="exportCsvBtn" class="btn btn-primary">📎 CSV (শীট আকারে)</button>
            <button id="exportBtn" class="btn btn-warning">📁 JSON ডাউনলোড</button>
            <label for="importFile" class="btn btn-outline" style="cursor:pointer;">📂 JSON আপলোড</label>
            <input type="file" id="importFile" accept=".json" style="display:none;">
            <button id="resetDataBtn" class="btn btn-danger">🔄 রিসেট</button>
        </div>
        <p style="font-size: 0.7rem; text-align: center; margin-top: 16px; color: #6c86a3;">📌 CSV ফাইল গুগল শীট বা এক্সেলে খুলুন। JSON ব্যাকআপ হিসাবে রাখুন।</p>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";
    const STORAGE_KEY = "peopleManagerData";

    let peopleData = [];
    let fuseInstance = null;

    // ফোন ফাংশন
    function cleanIndianPhone(phone) {
        let cleaned = String(phone).replace(/[\s\-\(\)]/g, '');
        if (cleaned.startsWith('+91')) cleaned = cleaned.slice(3);
        else if (cleaned.startsWith('91')) cleaned = cleaned.slice(2);
        if (cleaned.startsWith('0')) cleaned = cleaned.slice(1);
        cleaned = cleaned.replace(/\D/g, '');
        return cleaned;
    }
    function isValidIndianPhone(phone) {
        return /^[6-9]\d{9}$/.test(cleanIndianPhone(phone));
    }
    function validatePhoneField() {
        const inp = document.getElementById('phone');
        const hint = document.getElementById('phoneHint');
        const raw = inp.value;
        if (!raw) { hint.innerHTML = ''; return false; }
        const valid = isValidIndianPhone(raw);
        hint.innerHTML = valid ? '✓ বৈধ ভারতীয় মোবাইল' : '✗ ১০ ডিজিট, 6/7/8/9 দিয়ে শুরু';
        hint.className = valid ? 'phone-hint valid' : 'phone-hint invalid';
        return valid;
    }
    function isDuplicatePhone(phone, excludeId = null) {
        const cleaned = cleanIndianPhone(phone);
        return peopleData.some(p => {
            if (excludeId !== null && p.id == excludeId) return false;
            return cleanIndianPhone(p.phone) === cleaned;
        });
    }

    // স্টোরেজ ও রেন্ডার
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(peopleData));
        updateStatsAndRender();
    }
    function rebuildFuse() {
        fuseInstance = new Fuse(peopleData, {
            keys: ['name', 'phone', 'area', 'role', 'cluster', 'note'],
            threshold: 0.3,
            includeMatches: true
        });
    }
    function getFilteredData() {
        let filtered = peopleData;
        const query = document.getElementById('searchBox').value.trim();
        if (query) filtered = fuseInstance.search(query).map(r => r.item);
        const role = document.getElementById('filterRole').value;
        const area = document.getElementById('filterArea').value;
        const cluster = document.getElementById('filterCluster').value;
        if (role) filtered = filtered.filter(p => p.role === role);
        if (area) filtered = filtered.filter(p => p.area === area);
        if (cluster) filtered = filtered.filter(p => p.cluster === cluster);
        return filtered;
    }
    function highlightText(text, query) {
        if (!query || !text) return text || '';
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    function renderGrid() {
        const filtered = getFilteredData();
        const grid = document.getElementById('peopleGrid');
        grid.innerHTML = '';
        const query = document.getElementById('searchBox').value.trim();
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px; color:#7f8c8d;">😞 কোনো সদস্য খুঁজে পাওয়া যায়নি</div>';
            document.getElementById('filteredCount').innerText = 0;
            return;
        }
        filtered.forEach(person => {
            const card = document.createElement('div');
            card.className = 'person-card';
            const nameHtml = highlightText(person.name || '', query);
            const phoneHtml = highlightText(person.phone || '', query);
            const areaHtml = highlightText(person.area || '', query);
            const roleHtml = highlightText(person.role || '', query);
            const clusterHtml = highlightText(person.cluster || '', query);
            const noteHtml = highlightText(person.note || '', query);
            card.innerHTML = `
                <div class="card-header">
                    <div class="person-name">${nameHtml || 'নাম নেই'}</div>
                    <div class="person-phone">📞 ${phoneHtml}</div>
                </div>
                <div class="detail-row">
                    ${person.area ? `<span class="detail-badge">📍 ${areaHtml}</span>` : ''}
                    ${person.role ? `<span class="detail-badge">👤 ${roleHtml}</span>` : ''}
                    ${person.cluster ? `<span class="detail-badge">🔘 ${clusterHtml}</span>` : ''}
                </div>
                ${person.note ? `<div class="note-text">📝 ${noteHtml}</div>` : ''}
                <div class="card-actions">
                    <button class="icon-btn edit-person" data-id="${person.id}" title="এডিট">✏️</button>
                    <button class="icon-btn delete-person" data-id="${person.id}" title="ডিলিট">🗑️</button>
                    <button class="icon-btn call-person" data-phone="${person.phone}" title="কল">📞</button>
                    <button class="icon-btn wa-person" data-phone="${person.phone}" title="হোয়াটসঅ্যাপ">💬</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.edit-person').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const person = peopleData.find(p => p.id === id);
                if (person) loadPersonToForm(person);
            });
        });
        document.querySelectorAll('.delete-person').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                deletePersonWithPassword(id);
            });
        });
        document.querySelectorAll('.call-person').forEach(btn => {
            btn.addEventListener('click', () => {
                const phone = cleanIndianPhone(btn.dataset.phone);
                if (phone) window.location.href = `tel:+91${phone}`;
            });
        });
        document.querySelectorAll('.wa-person').forEach(btn => {
            btn.addEventListener('click', () => {
                const phone = cleanIndianPhone(btn.dataset.phone);
                if (phone) window.open(`https://wa.me/91${phone}`, '_blank');
            });
        });
        document.getElementById('filteredCount').innerText = filtered.length;
        document.getElementById('totalCount').innerText = peopleData.length;
    }

    function updateStatsAndRender() {
        rebuildFuse();
        populateFilters();
        renderGrid();
    }

    function populateFilters() {
        const roles = [...new Set(peopleData.map(p => p.role).filter(r => r && r.trim()))];
        const areas = [...new Set(peopleData.map(p => p.area).filter(a => a && a.trim()))];
        const clusters = [...new Set(peopleData.map(p => p.cluster).filter(c => c && c.trim()))];
        const roleSel = document.getElementById('filterRole');
        const areaSel = document.getElementById('filterArea');
        const clusterSel = document.getElementById('filterCluster');
        roleSel.innerHTML = '<option value="">সব রোল</option>';
        areaSel.innerHTML = '<option value="">সব এলাকা</option>';
        clusterSel.innerHTML = '<option value="">সব ক্লাস্টার</option>';
        roles.forEach(r => { let opt = document.createElement('option'); opt.value = r; opt.text = r; roleSel.appendChild(opt); });
        areas.forEach(a => { let opt = document.createElement('option'); opt.value = a; opt.text = a; areaSel.appendChild(opt); });
        clusters.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.text = c; clusterSel.appendChild(opt); });
    }

    // ফর্ম কন্ট্রোল
    function toggleForm(show) {
        const fc = document.getElementById('formCard');
        if (show === true) fc.classList.add('show');
        else if (show === false) fc.classList.remove('show');
        else fc.classList.toggle('show');
    }
    function resetFormToAddMode() {
        document.getElementById('peopleForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').innerHTML = '➕ নতুন সদস্য যোগ করুন';
        document.getElementById('submitBtn').innerHTML = '➕ যোগ করুন';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('phoneHint').innerHTML = '';
    }
    function loadPersonToForm(p) {
        document.getElementById('name').value = p.name;
        document.getElementById('phone').value = p.phone;
        validatePhoneField();
        document.getElementById('area').value = p.area || '';
        document.getElementById('role').value = p.role || '';
        document.getElementById('cluster').value = p.cluster || '';
        document.getElementById('note').value = p.note || '';
        document.getElementById('editId').value = p.id;
        document.getElementById('formTitle').innerHTML = '✏️ সদস্য এডিট করুন';
        document.getElementById('submitBtn').innerHTML = '💾 আপডেট করুন';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        toggleForm(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // পাসওয়ার্ড সুরক্ষা
    function verifyPassword(action) {
        const pwd = prompt(`🔐 ${action} করতে পাসওয়ার্ড দিন:`);
        return pwd === ADMIN_PASSWORD;
    }
    function deletePersonWithPassword(id) {
        if (!verifyPassword("ডিলিট")) { alert("ভুল পাসওয়ার্ড!"); return; }
        if (confirm('নিশ্চিত ডিলিট?')) {
            peopleData = peopleData.filter(p => p.id !== id);
            saveToStorage();
            if (document.getElementById('editId').value == id) resetFormToAddMode();
            alert("✅ ডিলিট হয়েছে।");
        }
    }
    function resetDataWithPassword() {
        if (!verifyPassword("ডেটা রিসেট")) { alert("ভুল পাসওয়ার্ড!"); return; }
        if (confirm('সব ডেটা ডিফল্ট উদাহরণ দিয়ে রিসেট হবে। নিশ্চিত?')) {
            loadDefaultData();
            saveToStorage();
            resetFormToAddMode();
            toggleForm(false);
            alert("ডেটা ডিফল্টে রিসেট করা হয়েছে।");
        }
    }

    // সেভ (যোগ/এডিট)
    function savePerson(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        let rawPhone = document.getElementById('phone').value.trim();
        if (!name) return alert('নাম দিন');
        if (!rawPhone) return alert('ফোন দিন');
        if (!isValidIndianPhone(rawPhone)) return alert('ভারতীয় মোবাইল নম্বর দিন (10 ডিজিট, 6/7/8/9 দিয়ে শুরু)');
        const editId = document.getElementById('editId').value;
        const cleanedPhone = cleanIndianPhone(rawPhone);
        let isEditingSamePhone = false;
        if (editId) {
            const curr = peopleData.find(p => p.id == editId);
            if (curr && cleanIndianPhone(curr.phone) === cleanedPhone) isEditingSamePhone = true;
        }
        if (!isEditingSamePhone && isDuplicatePhone(rawPhone, editId ? parseInt(editId) : null)) {
            return alert('এই ফোন নম্বরটি আগে থেকেই আছে!');
        }
        const area = document.getElementById('area').value.trim();
        const role = document.getElementById('role').value.trim();
        const cluster = document.getElementById('cluster').value.trim();
        const note = document.getElementById('note').value.trim();
        if (!editId) {
            const newId = peopleData.length ? Math.max(...peopleData.map(p => p.id)) + 1 : 1;
            peopleData.push({ id: newId, name, phone: cleanedPhone, area, role, cluster, note });
        } else {
            const idx = peopleData.findIndex(p => p.id == editId);
            if (idx !== -1) peopleData[idx] = { ...peopleData[idx], name, phone: cleanedPhone, area, role, cluster, note };
            resetFormToAddMode();
        }
        saveToStorage();
        resetFormToAddMode();
        toggleForm(false);
    }

    // CSV এক্সপোর্ট (শীট আকারে)
    function exportToCSV() {
        if (!peopleData.length) {
            alert("কোনো ডেটা নেই!");
            return;
        }
        // হেডার
        const headers = ["ID", "নাম", "ফোন", "এলাকা", "রোল", "ক্লাস্টার", "নোট"];
        const rows = peopleData.map(p => [
            p.id,
            `"${(p.name || '').replace(/"/g, '""')}"`,
            p.phone || '',
            `"${(p.area || '').replace(/"/g, '""')}"`,
            `"${(p.role || '').replace(/"/g, '""')}"`,
            `"${(p.cluster || '').replace(/"/g, '""')}"`,
            `"${(p.note || '').replace(/"/g, '""')}"`
        ]);
        const csvContent = [headers, ...rows].map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", `people_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        alert("✅ CSV ফাইল ডাউনলোড হয়েছে। গুগল শীট বা এক্সেলে খুলুন।");
    }

    // JSON এক্সপোর্ট/ইমপোর্ট
    function exportToJSON() {
        const dataStr = JSON.stringify(peopleData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `people_backup_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert("✅ JSON ফাইল ডাউনলোড হয়েছে।");
    }
    function importFromJSON(file) {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const imported = JSON.parse(ev.target.result);
                if (Array.isArray(imported)) {
                    peopleData = imported.map((p, idx) => ({ ...p, id: p.id || idx + 1 }));
                    saveToStorage();
                    alert('✅ ইমপোর্ট সফল!');
                } else throw new Error();
            } catch (e) {
                alert('ভুল JSON ফাইল');
            }
        };
        reader.readAsText(file);
    }

    // ডিফল্ট ডেটা
    function loadDefaultData() {
        peopleData = [
            { id: 1, name: "রাহুল শর্মা", phone: "9876543210", area: "দিল্লি", role: "সদস্য", cluster: "উত্তর", note: "সক্রিয় কর্মী" },
            { id: 2, name: "প্রিয়া সিং", phone: "9988776655", area: "মুম্বই", role: "নেত্রী", cluster: "পশ্চিম", note: "নতুন যোগদান" },
            { id: 3, name: "অমিত কুমার", phone: "9000000000", area: "পাটনা", role: "ভলান্টিয়ার", cluster: "পূর্ব", note: "বিশেষ দক্ষতা" }
        ];
        saveToStorage();
    }

    function initData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) peopleData = JSON.parse(stored);
        else loadDefaultData();
        peopleData.sort((a, b) => a.id - b.id);
        rebuildFuse();
        populateFilters();
        renderGrid();
        document.getElementById('totalCount').innerText = peopleData.length;
    }

    // ইভেন্ট লিসেনার
    document.getElementById('toggleFormBtn').addEventListener('click', () => toggleForm());
    document.getElementById('peopleForm').addEventListener('submit', savePerson);
    document.getElementById('cancelEditBtn').addEventListener('click', () => { resetFormToAddMode(); toggleForm(false); });
    document.getElementById('searchBox').addEventListener('input', () => renderGrid());
    document.getElementById('filterRole').addEventListener('change', () => renderGrid());
    document.getElementById('filterArea').addEventListener('change', () => renderGrid());
    document.getElementById('filterCluster').addEventListener('change', () => renderGrid());
    document.getElementById('exportBtn').addEventListener('click', exportToJSON);
    document.getElementById('exportCsvBtn').addEventListener('click', exportToCSV);
    document.getElementById('importFile').addEventListener('change', (e) => {
        if (e.target.files.length) importFromJSON(e.target.files[0]);
        e.target.value = '';
    });
    document.getElementById('resetDataBtn').addEventListener('click', resetDataWithPassword);
    document.getElementById('phone').addEventListener('input', validatePhoneField);

    initData();
</script>
</body>
</html>
