<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>প্রো পিপল ম্যানেজার | ডায়নামিক ফিল্ড</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            padding: 20px 16px 40px;
            color: #1e293b;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .password-hint {
            background: #fef9c3;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #854d0e;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08);
        }
        .form-card { display: none; }
        .form-card.show { display: block; animation: slideDown 0.25s ease; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 700;
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
        }
        input, select, textarea {
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.9rem;
            background: white;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-outline { background: transparent; border: 1.5px solid #cbd5e1; }
        .btn-new { width: 100%; background: #1e293b; color: white; padding: 14px; margin-bottom: 12px; font-size: 1rem; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 16px; }
        .btn-sm { padding: 5px 10px; font-size: 0.7rem; }
        .search-box {
            width: 100%;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1.5px solid #e2e8f0;
            margin-bottom: 1rem;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.2rem;
        }
        .filters select {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .view-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .view-btn {
            background: #f1f5f9;
            border: none;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .view-btn.active {
            background: #3b82f6;
            color: white;
        }
        .people-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .person-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #eef2f8;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .person-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #0f172a;
        }
        .person-phone {
            font-size: 0.75rem;
            background: #eef2ff;
            padding: 3px 12px;
            border-radius: 40px;
            font-weight: 500;
            color: #2563eb;
        }
        .detail-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .detail-badge {
            background: #f8fafc;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #475569;
        }
        .dynamic-field {
            background: #eef2ff;
            color: #1e40af;
        }
        .note-text {
            background: #fffbeb;
            padding: 8px 12px;
            border-radius: 16px;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #92400e;
            border-left: 3px solid #f59e0b;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 10px;
            border-top: 1px solid #eef2f8;
            padding-top: 10px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 40px;
        }
        .icon-btn:hover { background: #f1f5f9; }
        .kebab-wrapper {
            position: relative;
            display: inline-block;
        }
        .kebab-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: none;
            z-index: 100;
            min-width: 120px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .kebab-menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 8px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .kebab-menu button:hover { background: #f1f5f9; }
        .list-view { overflow-x: auto; display: none; }
        .list-view.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eef2f8; font-size: 0.75rem; }
        th { background: #f8fafc; font-weight: 700; }
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 10px 16px;
            flex: 1;
            text-align: center;
        }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: #3b82f6; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow: auto;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            animation: fadeOut 3s forwards;
            z-index: 1000;
            font-size: 0.8rem;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .field-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .field-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .card { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <h1>⚡ প্রো পিপল ম্যানেজার</h1>
        <div class="password-hint">🔐 পাসওয়ার্ড: admin123</div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
        <button id="toggleFormBtn" class="btn btn-new" style="margin-bottom: 0;">➕ নতুন সদস্য</button>
        <button id="manageFieldsBtn" class="btn btn-primary">⚙️ ফিল্ড ম্যানেজ করুন</button>
    </div>

    <div id="formCard" class="card form-card">
        <h2 id="formTitle" style="margin-bottom: 1rem;">➕ নতুন সদস্য</h2>
        <form id="peopleForm">
            <div id="dynamicFormFields" class="form-grid"></div>
            <div class="btn-group">
                <button type="submit" class="btn btn-success" id="submitBtn">💾 সংরক্ষণ</button>
                <button type="button" id="cancelEditBtn" class="btn btn-outline" style="display:none;">বাতিল</button>
            </div>
            <input type="hidden" id="editId">
        </form>
    </div>

    <div class="card">
        <input type="text" id="searchBox" class="search-box" placeholder="🔍 যেকোনো কিছু লিখুন...">
        <div id="dynamicFilters" class="filters"></div>
        <div class="view-toggle">
            <button class="view-btn active" data-view="grid">📱 কার্ড ভিউ</button>
            <button class="view-btn" data-view="list">📋 লিস্ট ভিউ</button>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>মোট সদস্য</div></div>
            <div class="stat-card"><div class="stat-number" id="filteredCount">0</div><div>ফলাফল</div></div>
        </div>

        <div id="gridView" class="people-grid"></div>
        <div id="listView" class="list-view"><table><thead id="listHeader"></thead><tbody id="listTableBody"></tbody></table></div>

        <div class="btn-group">
            <button id="exportCsvBtn" class="btn btn-primary">📎 CSV</button>
            <button id="exportJsonBtn" class="btn btn-warning">📁 JSON</button>
            <label for="importFile" class="btn btn-outline" style="cursor:pointer;">📂 ইমপোর্ট</label>
            <input type="file" id="importFile" accept=".json" style="display:none;">
            <button id="resetDataBtn" class="btn btn-danger">🔄 রিসেট</button>
        </div>
    </div>
</div>

<script>
    // ======================= কনফিগারেশন =======================
    const ADMIN_PASSWORD = "admin123";
    const STORAGE_KEY = "peopleManagerPro";
    const FIELDS_KEY = "dynamicFields";

    // ডিফল্ট ফিল্ড (সবসময় থাকবে)
    let defaultFields = [
        { name: "name", label: "নাম", type: "text", required: true, inForm: true, inFilter: true, inCard: true },
        { name: "phone", label: "ফোন", type: "tel", required: true, inForm: true, inFilter: true, inCard: true },
        { name: "note", label: "নোট", type: "textarea", required: false, inForm: true, inFilter: true, inCard: true }
    ];

    let customFields = [];  // ব্যবহারকারী যুক্ত করবেন
    let peopleData = [];
    let fuseInstance = null;
    let currentView = 'grid';

    // ফিল্ড লোড/সেভ
    function loadFields() {
        const stored = localStorage.getItem(FIELDS_KEY);
        if (stored) {
            customFields = JSON.parse(stored);
        } else {
            // ডিফল্ট কাস্টম ফিল্ড (ব্লক ও জিপি)
            customFields = [
                { name: "block", label: "ব্লক", type: "text", required: false, inForm: true, inFilter: true, inCard: true, options: [] },
                { name: "gp", label: "গ্রাম পঞ্চায়েত", type: "text", required: false, inForm: true, inFilter: true, inCard: true, options: [] },
                { name: "area", label: "এলাকা", type: "text", required: false, inForm: true, inFilter: true, inCard: true, options: [] },
                { name: "role", label: "রোল", type: "text", required: false, inForm: true, inFilter: true, inCard: true, options: [] }
            ];
            saveFields();
        }
    }
    function saveFields() {
        localStorage.setItem(FIELDS_KEY, JSON.stringify(customFields));
    }
    function getAllFields() {
        return [...defaultFields, ...customFields];
    }
    function getFormFields() {
        return getAllFields().filter(f => f.inForm !== false);
    }
    function getFilterFields() {
        return getAllFields().filter(f => f.inFilter !== false && f.name !== 'note' && f.name !== 'phone');
    }

    // ফিল্ড ম্যানেজ মডাল
    function showFieldManager() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        let fieldsHtml = '';
        customFields.forEach((field, idx) => {
            fieldsHtml += `
                <div class="field-item">
                    <div>
                        <strong>${field.label}</strong><br>
                        <small style="color:#64748b;">${field.name}</small>
                    </div>
                    <div>
                        <button class="btn btn-outline btn-sm edit-field" data-idx="${idx}">✏️</button>
                        <button class="btn btn-danger btn-sm delete-field" data-idx="${idx}">🗑️</button>
                    </div>
                </div>
            `;
        });
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom: 16px;">⚙️ কাস্টম ফিল্ড ম্যানেজমেন্ট</h3>
                <div style="margin-bottom: 16px;">
                    <div class="form-group">
                        <label>নতুন ফিল্ডের নাম (ইংরেজি, ছোট হরফ)</label>
                        <input type="text" id="newFieldName" placeholder="যেমন: occupation, blood_group">
                    </div>
                    <div class="form-group">
                        <label>লেবেল (বাংলায় দেখাবে)</label>
                        <input type="text" id="newFieldLabel" placeholder="যেমন: পেশা, রক্তের গ্রুপ">
                    </div>
                    <div class="form-group">
                        <label>টাইপ</label>
                        <select id="newFieldType">
                            <option value="text">টেক্সট</option>
                            <option value="number">নম্বর</option>
                            <option value="date">তারিখ</option>
                            <option value="select">সিলেক্ট (ড্রপডাউন)</option>
                        </select>
                    </div>
                    <div id="optionsContainer" style="display:none;">
                        <label>অপশন (কমা দিয়ে আলাদা করুন)</label>
                        <input type="text" id="fieldOptions" placeholder="যেমন: সদস্য,নেত্রী,ভলান্টিয়ার">
                    </div>
                    <button id="addFieldBtn" class="btn btn-success" style="margin-top: 10px;">➕ ফিল্ড যোগ করুন</button>
                </div>
                <hr>
                <h4>বর্তমান কাস্টম ফিল্ডসমূহ:</h4>
                <div class="field-list">${fieldsHtml || '<p style="color:#94a3b8;">কোনো কাস্টম ফিল্ড নেই</p>'}</div>
                <div class="btn-group" style="margin-top: 16px;">
                    <button id="closeFieldModal" class="btn btn-primary">সংরক্ষণ করুন</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        // টাইপ চেঞ্জ হলে অপশন ফিল্ড দেখানো
        document.getElementById('newFieldType').addEventListener('change', (e) => {
            const optionsDiv = document.getElementById('optionsContainer');
            optionsDiv.style.display = e.target.value === 'select' ? 'block' : 'none';
        });
        
        document.getElementById('addFieldBtn').onclick = () => {
            const name = document.getElementById('newFieldName').value.trim();
            const label = document.getElementById('newFieldLabel').value.trim();
            const type = document.getElementById('newFieldType').value;
            let options = [];
            if (type === 'select') {
                const opts = document.getElementById('fieldOptions').value.trim();
                if (opts) options = opts.split(',').map(o => o.trim());
            }
            if (!name || !label) { showToast("নাম ও লেবেল দিন"); return; }
            if (!/^[a-z_]+$/.test(name)) { showToast("ফিল্ডের নাম শুধু ছোট হরফ ও আন্ডারস্কোর হতে পারে"); return; }
            if (customFields.some(f => f.name === name)) { showToast("এই নামে ফিল্ড already আছে"); return; }
            customFields.push({ name, label, type, required: false, inForm: true, inFilter: true, inCard: true, options });
            saveFields();
            modal.remove();
            showFieldManager();
            updateAll();
            showToast(`✅ "${label}" ফিল্ড যোগ হয়েছে`);
        };
        
        document.querySelectorAll('.edit-field').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                const field = customFields[idx];
                const newLabel = prompt("নতুন লেবেল দিন:", field.label);
                if (newLabel && newLabel.trim()) {
                    field.label = newLabel.trim();
                    saveFields();
                    modal.remove();
                    showFieldManager();
                    updateAll();
                }
            });
        });
        document.querySelectorAll('.delete-field').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.idx);
                if (confirm(`"${customFields[idx].label}" ফিল্ড মুছবেন?`)) {
                    customFields.splice(idx, 1);
                    saveFields();
                    modal.remove();
                    showFieldManager();
                    updateAll();
                    showToast("✅ ফিল্ড মুছে ফেলা হয়েছে");
                }
            });
        });
        document.getElementById('closeFieldModal').onclick = () => modal.remove();
    }

    // ফোন ফাংশন
    function cleanIndianPhone(phone) {
        let cleaned = String(phone).replace(/[\s\-\(\)]/g, '');
        if (cleaned.startsWith('+91')) cleaned = cleaned.slice(3);
        else if (cleaned.startsWith('91')) cleaned = cleaned.slice(2);
        if (cleaned.startsWith('0')) cleaned = cleaned.slice(1);
        return cleaned.replace(/\D/g, '');
    }
    function isValidIndianPhone(phone) { return /^[6-9]\d{9}$/.test(cleanIndianPhone(phone)); }
    function isDuplicatePhone(phone, excludeId = null) {
        const cleaned = cleanIndianPhone(phone);
        return peopleData.some(p => {
            if (excludeId !== null && p.id === excludeId) return false;
            return cleanIndianPhone(p.phone) === cleaned;
        });
    }

    // স্টোরেজ ও ফিউজ
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(peopleData));
        updateAll();
    }
    function rebuildFuse() {
        const keys = getAllFields().filter(f => f.name !== 'id').map(f => f.name);
        fuseInstance = new Fuse(peopleData, { keys, threshold: 0.3, includeMatches: true });
    }
    function getFilteredData() {
        let filtered = [...peopleData];
        const query = document.getElementById('searchBox').value.trim();
        if (query) {
            const results = fuseInstance.search(query);
            filtered = results.map(r => r.item);
        }
        for (let field of getFilterFields()) {
            const filterValue = document.getElementById(`filter_${field.name}`);
            if (filterValue && filterValue.value) {
                filtered = filtered.filter(p => p[field.name] === filterValue.value);
            }
        }
        return filtered;
    }
    function highlightText(text, query) {
        if (!query || !text) return text || '';
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, `<span style="background:#fef08a; color:#0f172a; padding:0 2px; border-radius:4px;">$1</span>`);
    }

    // রেন্ডার ফর্ম
    function renderForm(person = null) {
        const container = document.getElementById('dynamicFormFields');
        container.innerHTML = '';
        for (let field of getFormFields()) {
            const value = person ? (person[field.name] || '') : '';
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `<label>${field.label} ${field.required ? '*' : ''}</label>`;
            if (field.type === 'textarea') {
                const textarea = document.createElement('textarea');
                textarea.id = `field_${field.name}`;
                textarea.rows = 2;
                textarea.value = value;
                if (field.required) textarea.required = true;
                div.appendChild(textarea);
            } else if (field.type === 'select' && field.options && field.options.length) {
                const select = document.createElement('select');
                select.id = `field_${field.name}`;
                select.innerHTML = '<option value="">নির্বাচন করুন</option>';
                field.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (value === opt) option.selected = true;
                    select.appendChild(option);
                });
                div.appendChild(select);
            } else {
                const input = document.createElement('input');
                input.type = field.type;
                input.id = `field_${field.name}`;
                input.value = value;
                if (field.required) input.required = true;
                div.appendChild(input);
            }
            container.appendChild(div);
        }
    }

    // রেন্ডার ফিল্টার
    function renderFilters() {
        const container = document.getElementById('dynamicFilters');
        container.innerHTML = '';
        for (let field of getFilterFields()) {
            const values = [...new Set(peopleData.map(p => p[field.name]).filter(v => v && v.trim()))];
            if (values.length === 0 && field.type !== 'select') continue;
            const select = document.createElement('select');
            select.id = `filter_${field.name}`;
            select.innerHTML = `<option value="">সব ${field.label}</option>`;
            if (field.type === 'select' && field.options) {
                field.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    select.appendChild(option);
                });
            } else {
                values.forEach(val => {
                    const option = document.createElement('option');
                    option.value = val;
                    option.textContent = val;
                    select.appendChild(option);
                });
            }
            select.addEventListener('change', () => render());
            container.appendChild(select);
        }
    }

    // রেন্ডার কার্ড
    function renderGrid() {
        const filtered = getFilteredData();
        const grid = document.getElementById('gridView');
        grid.innerHTML = '';
        const query = document.getElementById('searchBox').value.trim();
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">😞 কোন সদস্য খুঁজে পাওয়া যায়নি</div>';
            return;
        }
        filtered.forEach(person => {
            const card = document.createElement('div');
            card.className = 'person-card';
            let detailsHtml = '<div class="detail-row">';
            for (let field of getAllFields()) {
                if (field.name === 'note') continue;
                if (field.inCard !== false && person[field.name]) {
                    const valueHtml = highlightText(person[field.name], query);
                    detailsHtml += `<span class="detail-badge ${field.name !== 'name' && field.name !== 'phone' ? 'dynamic-field' : ''}">${field.label}: ${valueHtml}</span>`;
                }
            }
            detailsHtml += '</div>';
            if (person.note) {
                detailsHtml += `<div class="note-text">📝 ${highlightText(person.note, query)}</div>`;
            }
            card.innerHTML = `
                <div class="card-header">
                    <div class="person-name">${highlightText(person.name, query)}</div>
                    <div class="person-phone">📞 ${highlightText(person.phone, query)}</div>
                </div>
                ${detailsHtml}
                <div class="card-actions">
                    <button class="icon-btn call-btn" data-phone="${person.phone}">📞 কল</button>
                    <button class="icon-btn wa-btn" data-phone="${person.phone}">💬 হোয়াটসঅ্যাপ</button>
                    <div class="kebab-wrapper">
                        <button class="icon-btn kebab-btn">⋮</button>
                        <div class="kebab-menu">
                            <button class="edit-person" data-id="${person.id}">✏️ এডিট</button>
                            <button class="delete-person" data-id="${person.id}">🗑️ ডিলিট</button>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        attachCardEvents();
    }

    function renderList() {
        const filtered = getFilteredData();
        const thead = document.getElementById('listHeader');
        const tbody = document.getElementById('listTableBody');
        const fields = getAllFields().filter(f => f.name !== 'id');
        thead.innerHTML = `<tr>${fields.map(f => `<th>${f.label}</th>`).join('')}<th>অ্যাকশন</th></tr>`;
        tbody.innerHTML = '';
        const query = document.getElementById('searchBox').value.trim();
        filtered.forEach(person => {
            const row = tbody.insertRow();
            fields.forEach(field => {
                let content = person[field.name] || '';
                if (field.name === 'phone') {
                    content = `<a href="tel:+91${cleanIndianPhone(content)}">${highlightText(content, query)}</a>`;
                } else {
                    content = highlightText(content, query);
                }
                row.insertCell().innerHTML = content;
            });
            const actions = row.insertCell();
            actions.innerHTML = `
                <button class="icon-btn call-list" data-phone="${person.phone}">📞</button>
                <button class="icon-btn wa-list" data-phone="${person.phone}">💬</button>
                <button class="icon-btn edit-list" data-id="${person.id}">✏️</button>
                <button class="icon-btn delete-list" data-id="${person.id}">🗑️</button>
            `;
        });
        attachListEvents();
    }

    function attachCardEvents() {
        document.querySelectorAll('.call-btn, .call-list').forEach(btn => {
            btn.addEventListener('click', () => {
                const phone = cleanIndianPhone(btn.dataset.phone);
                if (phone) window.location.href = `tel:+91${phone}`;
            });
        });
        document.querySelectorAll('.wa-btn, .wa-list').forEach(btn => {
            btn.addEventListener('click', () => {
                const phone = cleanIndianPhone(btn.dataset.phone);
                if (phone) window.open(`https://wa.me/91${phone}`, '_blank');
            });
        });
        document.querySelectorAll('.kebab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const menu = btn.parentElement.querySelector('.kebab-menu');
                document.querySelectorAll('.kebab-menu').forEach(m => { if (m !== menu) m.style.display = 'none'; });
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            });
        });
        document.querySelectorAll('.edit-person, .edit-list').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const person = peopleData.find(p => p.id === id);
                if (person) loadPersonToForm(person);
                if (btn.closest('.kebab-menu')) btn.closest('.kebab-menu').style.display = 'none';
            });
        });
        document.querySelectorAll('.delete-person, .delete-list').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                deletePersonWithPassword(id);
                if (btn.closest('.kebab-menu')) btn.closest('.kebab-menu').style.display = 'none';
            });
        });
        document.addEventListener('click', () => {
            document.querySelectorAll('.kebab-menu').forEach(m => m.style.display = 'none');
        });
    }
    function attachListEvents() { attachCardEvents(); }

    function deletePersonWithPassword(id) {
        const pwd = prompt("🔐 ডিলিট করতে পাসওয়ার্ড দিন:");
        if (pwd !== ADMIN_PASSWORD) { showToast("❌ ভুল পাসওয়ার্ড!"); return; }
        if (confirm("নিশ্চিত ডিলিট?")) {
            peopleData = peopleData.filter(p => p.id !== id);
            saveToStorage();
            if (document.getElementById('editId').value == id) resetFormToAddMode();
            showToast("✅ ডিলিট হয়েছে");
        }
    }
    function resetDataWithPassword() {
        const pwd = prompt("🔐 রিসেট করতে পাসওয়ার্ড দিন:");
        if (pwd !== ADMIN_PASSWORD) { showToast("❌ ভুল পাসওয়ার্ড!"); return; }
        if (confirm("সব ডেটা ডিফল্ট উদাহরণ দিয়ে রিসেট হবে?")) {
            loadDefaultData();
            saveToStorage();
            resetFormToAddMode();
            toggleForm(false);
            showToast("✅ রিসেট হয়েছে");
        }
    }
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ফর্ম
    function toggleForm(show) {
        const fc = document.getElementById('formCard');
        if (show) fc.classList.add('show');
        else fc.classList.remove('show');
    }
    function resetFormToAddMode() {
        document.getElementById('peopleForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').innerHTML = '➕ নতুন সদস্য যোগ করুন';
        document.getElementById('submitBtn').innerHTML = '💾 সংরক্ষণ করুন';
        document.getElementById('cancelEditBtn').style.display = 'none';
        renderForm(null);
    }
    function loadPersonToForm(person) {
        document.getElementById('formTitle').innerHTML = '✏️ সদস্য এডিট করুন';
        document.getElementById('submitBtn').innerHTML = '💾 আপডেট করুন';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.getElementById('editId').value = person.id;
        renderForm(person);
        toggleForm(true);
        window.scrollTo({ top: 0 });
    }
    function savePerson(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const newPerson = { id: editId ? parseInt(editId) : null };
        for (let field of getFormFields()) {
            const input = document.getElementById(`field_${field.name}`);
            if (input) newPerson[field.name] = input.value.trim();
        }
        if (!newPerson.name) { showToast("নাম দিন"); return; }
        if (!newPerson.phone) { showToast("ফোন দিন"); return; }
        if (!isValidIndianPhone(newPerson.phone)) { showToast("ভারতীয় ফোন দিন"); return; }
        const cleanedPhone = cleanIndianPhone(newPerson.phone);
        let isEditingSamePhone = false;
        if (editId) {
            const curr = peopleData.find(p => p.id == parseInt(editId));
            if (curr && cleanIndianPhone(curr.phone) === cleanedPhone) isEditingSamePhone = true;
        }
        if (!isEditingSamePhone && isDuplicatePhone(newPerson.phone, editId ? parseInt(editId) : null)) {
            showToast("এই ফোন নম্বর আগে থেকেই আছে!");
            return;
        }
        newPerson.phone = cleanedPhone;
        if (!editId) {
            const maxId = peopleData.length > 0 ? Math.max(...peopleData.map(p => p.id)) : 0;
            newPerson.id = maxId + 1;
            peopleData.push(newPerson);
            showToast("✅ নতুন সদস্য যোগ হয়েছে");
        } else {
            const index = peopleData.findIndex(p => p.id == parseInt(editId));
            if (index !== -1) {
                peopleData[index] = { ...peopleData[index], ...newPerson };
                showToast("✅ আপডেট হয়েছে");
            }
            resetFormToAddMode();
        }
        saveToStorage();
        resetFormToAddMode();
        toggleForm(false);
    }

    // এক্সপোর্ট/ইমপোর্ট
    function exportToCSV() {
        if (!peopleData.length) { showToast("কোন ডেটা নেই"); return; }
        const fields = getAllFields().filter(f => f.name !== 'id');
        const headers = fields.map(f => f.label);
        const rows = peopleData.map(p => fields.map(f => `"${(p[f.name] || '').replace(/"/g, '""')}"`));
        const csv = [headers, ...rows].map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `people_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast("📎 CSV ডাউনলোড হয়েছে");
    }
    function exportToJSON() {
        const exportData = peopleData.map(p => {
            const obj = {};
            for (let field of getAllFields()) {
                obj[field.name] = p[field.name] || '';
            }
            return obj;
        });
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `people_backup_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast("📁 JSON ব্যাকআপ হয়েছে");
    }
    function importFromJSON(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const imported = JSON.parse(event.target.result);
                if (!Array.isArray(imported)) throw new Error();
                const maxId = peopleData.length > 0 ? Math.max(...peopleData.map(p => p.id)) : 0;
                const finalData = imported.map((item, idx) => {
                    const newItem = { id: maxId + idx + 1 };
                    for (let field of getAllFields()) {
                        newItem[field.name] = item[field.name] || '';
                    }
                    return newItem;
                });
                peopleData = finalData;
                saveToStorage();
                showToast(`✅ ${finalData.length}টি সদস্য ইমপোর্ট হয়েছে`);
            } catch(err) {
                showToast("❌ ভুল JSON ফাইল");
            }
        };
        reader.readAsText(file);
    }
    function loadDefaultData() {
        peopleData = [
            { id: 1, name: "রাহুল শর্মা", phone: "9876543210", area: "মালদহ", role: "সদস্য", block: "হরিশ্চন্দ্রপুর", gp: "ভবানীপুর", note: "সক্রিয় কর্মী" },
            { id: 2, name: "প্রিয়া সিং", phone: "9988776655", area: "মালদহ", role: "নেত্রী", block: "চাঁদপুর", gp: "চাঁদপুর সদর", note: "নতুন যোগদান" }
        ];
    }

    function render() {
        if (currentView === 'grid') renderGrid();
        else renderList();
        updateStats();
    }
    function updateStats() {
        const filtered = getFilteredData();
        document.getElementById('filteredCount').innerText = filtered.length;
        document.getElementById('totalCount').innerText = peopleData.length;
    }
    function updateAll() {
        rebuildFuse();
        renderFilters();
        render();
    }

    // ইভেন্ট লিসেনার
    document.getElementById('toggleFormBtn').addEventListener('click', () => { resetFormToAddMode(); toggleForm(true); });
    document.getElementById('peopleForm').addEventListener('submit', savePerson);
    document.getElementById('cancelEditBtn').addEventListener('click', () => { resetFormToAddMode(); toggleForm(false); });
    document.getElementById('searchBox').addEventListener('input', () => render());
    document.getElementById('exportCsvBtn').addEventListener('click', exportToCSV);
    document.getElementById('exportJsonBtn').addEventListener('click', exportToJSON);
    document.getElementById('importFile').addEventListener('change', (e) => { if(e.target.files.length) importFromJSON(e.target.files[0]); e.target.value = ''; });
    document.getElementById('resetDataBtn').addEventListener('click', resetDataWithPassword);
    document.getElementById('manageFieldsBtn').addEventListener('click', showFieldManager);
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.dataset.view;
            document.getElementById('gridView').style.display = currentView === 'grid' ? 'block' : 'none';
            document.getElementById('listView').classList.toggle('active', currentView === 'list');
            render();
        });
    });

    function init() {
        loadFields();
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) peopleData = JSON.parse(stored);
        else loadDefaultData();
        peopleData.forEach((p, idx) => { if (typeof p.id !== 'number') p.id = idx + 1; });
        updateAll();
    }
    init();
</script>
</body>
</html>
